version: "3.8"

networks:
  monitoring:
    driver: bridge

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - monitoring
    mem_limit: 2000m
    cpus: 1.0
    restart: unless-stopped

  blc-prometheus:
    image: prom/prometheus:latest
    container_name: blc-prometheus
    ports: ["9091:9090"]
    volumes: ["./blc-prometheus.yaml:/etc/prometheus/prometheus.yml"]
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/tmp/prometheus",
        "--storage.tsdb.retention.time=1h",
      ]
    networks: [monitoring]
    mem_limit: 1000m
    cpus: 0.5
    restart: unless-stopped

  saradar-prometheus:
