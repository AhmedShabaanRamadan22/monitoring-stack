global:
  scrape_interval: 1m
  evaluation_interval: 1m
  scrape_timeout: 10s
  external_labels:
    customer: arkam

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
          - 172.18.96.1:9182
          - 172.18.96.2:9182
          - 172.18.96.17:9182
          - 172.18.97.7:9100
          - 172.18.97.8:9100
          - 172.18.97.9:9100
          - 172.18.97.10:9100
          - 172.18.97.11:9100
          - 172.18.97.12:9100
          - 172.18.97.13:9100
          - 172.18.97.14:9100
          - 172.18.97.15:9100
remote_write:
  - url: http://victoria-metrics:8428/api/v1/write