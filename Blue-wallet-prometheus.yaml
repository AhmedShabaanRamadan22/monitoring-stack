global:
  scrape_interval: 1m
  evaluation_interval: 1m
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
          - 172.18.240.3:9100
          - 172.18.240.4:9100
          - 172.18.240.19:9100
          - 172.18.240.20:9100
          - 172.18.240.49:9182
          - 172.18.240.50:9182
